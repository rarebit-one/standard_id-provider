version: 2
updates:
  - package-ecosystem: bundler
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    # Paused 2026-05-25: Dependabot's bundler updater supports Ruby <= 3.4.8, but
    # this gem requires Ruby >= 4.0, so bundler version updates fail with
    # tool_version_not_supported. Restore to 10 once Dependabot supports Ruby 4.0.
    open-pull-requests-limit: 0
    # standard_id is a sibling workspace gem consumed via `path:` for local dev
    # (gated by `unless ENV["CI"]` in the Gemfile). Dependabot's evaluation env
    # doesn't set CI=true, so it sees the path ref and fails with
    # `path_dependencies_not_reachable`. Ignore the dep entirely.
    ignore:
      - dependency-name: "standard_id"
    groups:
      development-dependencies:
        dependency-type: "development"
      production-dependencies:
        dependency-type: "production"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      actions:
        patterns:
          - "*"
