name: CI

on:
  pull_request:
  push:
    branches: [ main ]

permissions:
  contents: read
  pull-requests: read

jobs:
  ci:
    uses: rarebit-one/.github/.github/workflows/reusable-gem-ci.yml@v1
    with:
      # Test job is skipped (lint-only) until the spec/dummy app is reconciled
      # with the upstream standard_id config rename (StandardConfig -> StandardId::ConfigSchema).
      # Tracked separately; re-enable the matrix once the dummy app boots cleanly.
      ruby-versions: '[]'
      lint-ruby-version: "4.0.3"
      lint-command: 'bundle exec rubocop --config .rubocop.yml -f github'
      lint-cache-paths: |
        tmp/rubocop
      lint-cache-key: rubocop-${{ runner.os }}-4.0.3-${{ hashFiles('**/.rubocop.yml', '**/.rubocop_todo.yml', 'Gemfile', '*.gemspec') }}-${{ github.ref_name == github.event.repository.default_branch && github.run_id || 'default' }}
      extra-lint-commands: |
        bundle exec brakeman --no-pager --quiet
        bundle exec bundle-audit check --update
