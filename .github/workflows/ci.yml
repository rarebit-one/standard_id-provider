name: CI

on:
  pull_request:
  push:
    branches: [ main ]

permissions:
  contents: read
  pull-requests: read

jobs:
  ci:
    uses: rarebit-one/.github/.github/workflows/reusable-gem-ci.yml@v2
    with:
      # Test job is skipped (lint-only) until the spec/dummy app is reconciled
      # with the upstream standard_id config rename (StandardConfig -> StandardId::ConfigSchema).
      # Tracked separately; re-enable the matrix once the dummy app boots cleanly.
      ruby-versions: '[]'
      lint-ruby-version: "4.0.4"
      lint-command: 'bundle exec rubocop --config .rubocop.yml -f github'
      extra-lint-commands: |
        bundle exec brakeman --no-pager --quiet
        bundle exec bundle-audit check --update
